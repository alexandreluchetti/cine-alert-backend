api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

certificatesResolvers:
  letsencrypt:
    acme:
      email: luchetti.92@gmail.com
      storage: /acme.json
      tlsChallenge: {}        # ← porta 443, sem depender do port 80

providers:
  docker:
    exposedByDefault: false
    network: cinealert-network

log:
  level: INFO

accessLog: {}